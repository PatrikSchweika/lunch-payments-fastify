name: Node.js CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 11
        run_install: false

    - name: Use Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Build application
      run: pnpm run build

    - name: Lint
      run: pnpm run lint
